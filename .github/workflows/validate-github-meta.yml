name: Проверка GitHub-Метаданных

on:
  push:
    paths:
      - ".github/**"
      - "scripts/validate_github_meta.py"
      - "scripts/sync_github_labels.py"
  pull_request:
    paths:
      - ".github/**"
      - "scripts/validate_github_meta.py"
      - "scripts/sync_github_labels.py"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Проверка GitHub-метаданных
        run: |
          python3 scripts/validate_github_meta.py --repo-root .

      - name: Проверка манифеста label'ов
        run: |
          python3 scripts/sync_github_labels.py \
            --labels-file .github/labels.json \
            --validate-only
