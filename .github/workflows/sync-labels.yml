name: Синхронизация Label'ов

on:
  push:
    paths:
      - ".github/labels.json"
      - ".github/workflows/sync-labels.yml"
      - "scripts/sync_github_labels.py"
  pull_request:
    paths:
      - ".github/labels.json"
      - ".github/workflows/sync-labels.yml"
      - "scripts/sync_github_labels.py"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Проверка манифеста label'ов
        run: |
          python3 scripts/sync_github_labels.py \
            --labels-file .github/labels.json \
            --validate-only

  sync:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Синхронизация label'ов репозитория
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/sync_github_labels.py \
            --labels-file .github/labels.json \
            --repo "${{ github.repository }}" \
            --token "${GITHUB_TOKEN}"
